<html lang="en">
<head>

<body>
    <form action="/server">
        <input type="checkbox" name="age" id="age" checked>
        <label for="age" >I am 18+</label>

    </form>
    <hr>
    <form action="/server">
        <!-- that value thing helps us to see what was selected   -->
        <input type="radio" name="fruit" id="apple" value="apple">
        <label for="apple">Apple</label>
        <br>
        <input type="radio" name="fruit" id="mango" value="mango"> 

        <label for="mango">mango</label>
        <br>  
        <input type="radio" name="fruit" id="banana" value="banana">
        <label for="banana">banana</label>
        <button>Submit   </button>

    </form>
    <!-- dropdown -->
     <form action="/server">

             Choose your profession

            </select>

        </div>

     </form>
     <hr>
     <form action="/server">
        <div>
            choose ur age:
            <label for="age">age</label>
            <input type="range" min="0" max="100" name="age">
        </div>
        <button>submit</button>

     </form>
     <!-- textarea -->
      <form action="/server">
        <div>
            <label for="feedback">Please provide Your valuable feedback</label>

            <button>Submit</button>
        </div>


      </form>
